<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- BSP - Elephant -->
  <circle cx="32" cy="32" r="30" fill="#1E40AF" opacity="0.12"/>
  <!-- Elephant body -->
  <ellipse cx="30" cy="34" rx="16" ry="12" fill="#1E40AF"/>
  <!-- Head -->
  <circle cx="46" cy="26" r="10" fill="#1E40AF"/>
  <!-- Trunk -->
  <path d="M54 30 C58 34, 56 40, 52 44 C50 46, 48 44, 50 42 C52 40, 54 36, 52 32" fill="#1E40AF"/>
  <!-- Ear -->
  <ellipse cx="40" cy="22" rx="5" ry="7" fill="#1E40AF" opacity="0.8"/>
  <!-- Eye -->
  <circle cx="48" cy="24" r="1.5" fill="white"/>
  <!-- Tusk -->
  <path d="M50 30 L54 26" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="18" y="42" width="5" height="14" rx="2" fill="#1E40AF"/>
  <rect x="28" y="42" width="5" height="14" rx="2" fill="#1E40AF"/>
  <rect x="36" y="40" width="5" height="14" rx="2" fill="#1E40AF"/>
  <!-- Tail -->
  <path d="M14 30 C10 28, 8 32, 10 34" stroke="#1E40AF" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
