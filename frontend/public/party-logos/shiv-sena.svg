<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shiv Sena (Eknath Shinde) - Bow & Arrow -->
  <circle cx="32" cy="32" r="30" fill="#F97316" opacity="0.12"/>
  <!-- Bow -->
  <path d="M18 52 C10 38, 10 26, 18 12" stroke="#F97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="18" y1="12" x2="18" y2="52" stroke="#F97316" stroke-width="1.5"/>
  <!-- Arrow shaft -->
  <line x1="18" y1="32" x2="52" y2="32" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="52,32 44,26 44,38" fill="#F97316"/>
  <!-- Fletching -->
  <polygon points="18,32 22,28 22,36" fill="#F97316" opacity="0.7"/>
</svg>
