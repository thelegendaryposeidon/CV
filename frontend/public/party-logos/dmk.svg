  <line x1="42" y1="26" x2="48" y2="20" stroke="#B91C1C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="26" x2="16" y2="20" stroke="#B91C1C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="34" x2="54" y2="32" stroke="#B91C1C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="34" x2="10" y2="32" stroke="#B91C1C" stroke-width="2.5" stroke-linecap="round"/>
