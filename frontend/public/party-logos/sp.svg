<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Samajwadi Party - Bicycle -->
  <circle cx="32" cy="32" r="30" fill="#E11D48" opacity="0.12"/>
  <!-- Rear wheel -->
  <circle cx="18" cy="44" r="10" stroke="#E11D48" stroke-width="2.5" fill="none"/>
  <circle cx="18" cy="44" r="1.5" fill="#E11D48"/>
  <!-- Front wheel -->
  <circle cx="46" cy="44" r="10" stroke="#E11D48" stroke-width="2.5" fill="none"/>
  <circle cx="46" cy="44" r="1.5" fill="#E11D48"/>
  <!-- Frame -->
  <line x1="18" y1="44" x2="32" y2="26" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="26" x2="46" y2="44" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="44" x2="36" y2="44" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="44" x2="32" y2="26" stroke="#E11D48" stroke-width="2"/>
  <!-- Handlebar -->
  <line x1="42" y1="24" x2="48" y2="28" stroke="#E11D48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="44" x2="42" y2="24" stroke="#E11D48" stroke-width="2"/>
  <!-- Seat -->
  <line x1="28" y1="24" x2="36" y2="24" stroke="#E11D48" stroke-width="3" stroke-linecap="round"/>
</svg>
