<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Congress Hand symbol -->
  <circle cx="32" cy="32" r="30" fill="#0078D4" opacity="0.12"/>
  <!-- Palm -->
  <rect x="24" y="24" width="16" height="20" rx="3" fill="#0078D4"/>
  <!-- Fingers -->
  <rect x="25" y="10" width="3.5" height="16" rx="1.75" fill="#0078D4"/>
  <rect x="30.25" y="8" width="3.5" height="18" rx="1.75" fill="#0078D4"/>
  <rect x="35.5" y="10" width="3.5" height="16" rx="1.75" fill="#0078D4"/>
  <!-- Thumb -->
  <rect x="18" y="22" width="8" height="3.5" rx="1.75" fill="#0078D4"/>
  <rect x="17" y="18" width="3.5" height="8" rx="1.75" fill="#0078D4"/>
  <!-- Wrist -->
  <rect x="26" y="44" width="12" height="10" rx="2" fill="#0078D4" opacity="0.7"/>
